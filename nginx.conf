# nginx.conf — CodeLabz production server
#
# Serves the Vite static build and handles SPA routing correctly.
# All /api/* requests are proxied to the Vercel serverless functions
# (in production this would be your Vercel deployment URL; in local
# docker-compose it proxies to the api service on port 3001).

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static assets: long-lived cache (Vite adds content hash to filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── API proxy (for local docker-compose; remove/adjust for production) ──
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Firebase service worker scope ───────────────────────────────────────
    location /firebase-messaging-sw.js {
        add_header  Service-Worker-Allowed "/";
        try_files   $uri =404;
    }

    # ── SPA fallback: all other routes → index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint ───────────────────────────────────────────────
    location /health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml application/xml
                      application/xml+rss text/javascript image/svg+xml;
    gzip_min_length   1024;
    gzip_comp_level   6;
}
